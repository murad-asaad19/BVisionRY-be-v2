spring.datasource.url=jdbc:h2:mem:bvisionry-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
spring.cache.type=simple
spring.ai.openai.api-key=test-key
spring.ai.openai.base-url=http://localhost:9999

# Encryption
bvisionry.encryption.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

# Rate Limiting
bvisionry.rate-limit.try-it-out.requests-per-minute=100
bvisionry.rate-limit.evaluation.requests-per-minute=100

# Tests run over plain HTTP via MockMvc / TestRestTemplate.
bvisionry.security.cookies.secure=false
