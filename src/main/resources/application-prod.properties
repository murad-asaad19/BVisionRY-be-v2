# Database (Railway PostgreSQL)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Redis (Railway Redis) - optional, app works without it
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.repositories.enabled=false

# Mail — Resend HTTP API (Railway blocks outbound SMTP on ports 25/465/587/2525)
bvisionry.mail.transport=resend-http
bvisionry.mail.resend.api-key=${RESEND_API_KEY}
bvisionry.mail.from=${MAIL_FROM:noreply@bvisionry.com}
# MailHealthIndicator opens an SMTP socket against spring.mail.host, which is
# unreachable from Railway and would warn-spam every 30s. We don't use SMTP here.
management.health.mail.enabled=false

# Frontend URL (your Vercel domain)
bvisionry.frontend.base-url=${FRONTEND_URL:https://bvisionry.com}
bvisionry.cors.allowed-origins=${FRONTEND_URL:https://bvisionry.com}

# OAuth2 redirect_uri base — the FRONTEND (Vercel) origin, NOT the backend.
# Google redirects the browser to {this}/api/auth/oauth2/google/callback, a Next
# route handler that proxies the callback back to the backend so the session and
# oauth2_state cookies are set on the frontend origin where the BFF reads them
# (cookies are host-only). Must match the Authorized redirect URI in Google
# Cloud Console. See web/src/lib/oauth-relay.ts.
bvisionry.oauth2.redirect-base-url=${OAUTH2_REDIRECT_BASE:https://bvisionry.com}
bvisionry.oauth2.google.client-id=${GOOGLE_CLIENT_ID}
bvisionry.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET}
# Security — set these in Railway env vars; the inline defaults are TEMPORARY
# stopgaps so the prod profile can boot before the real secrets are configured.
# Railway env vars override the defaults with no code change. Replace before any
# real traffic: a committed secret is not a production secret.
#
# IMPORTANT (encryption key): once any AI provider key is saved via the admin
# panel it is encrypted with whatever BVISIONRY_ENCRYPTION_KEY is active at that
# moment. If you boot on the default below, enter AI keys, THEN switch to a real
# key in Railway, those stored keys become undecryptable. So set the real
# BVISIONRY_ENCRYPTION_KEY in Railway BEFORE entering any AI keys.
#
# Format constraints enforced in code:
#   jwt.secret            — >= 32 bytes (HS256), != built-in dev default (JwtProvider)
#   encryption.secret-key — exactly 64 hex chars / 32 bytes AES-256 (ApiKeyEncryptionService)
bvisionry.jwt.secret=${JWT_SECRET:a3f17c0e9b425d681f4e8a26c09d7b536b0d92f4e7a1c35880c5e213a9f4d76b}
bvisionry.encryption.secret-key=${BVISIONRY_ENCRYPTION_KEY:d7e2a91f3c60b4850a6c4e8d25f7b139e4810b53d9a2c70f5f3e8c10a7b6d924}

# Auth cookies — FE (Vercel) and BE (Railway) live on different eTLD+1, so the
# browser treats every API call as cross-site. Lax cookies would be dropped on
# fetch/XHR; we need SameSite=None, which in turn requires Secure=true.
bvisionry.security.cookies.secure=true
bvisionry.security.cookies.same-site=None

# AI provider/key/model are stored in the DB (ai_configurations) and set via the
# admin panel — no static AI properties needed here.

# Disable Swagger in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Server
server.port=${PORT:8080}

# Client IP resolution behind the Railway edge (B5 / F11).
#
# We deliberately do NOT use Spring's forward-headers processing: the `framework`
# strategy rewrites getRemoteAddr() from the LEFTMOST X-Forwarded-For entry, which
# the client fully controls — letting an attacker rotate the per-IP rate-limit
# bucket (bypassing the public-assessment / survey / auth limits) by spoofing XFF.
# Instead we leave the header untouched and let ClientIpResolver take the entry the
# trusted edge actually observed, counting `trusted-proxy-hops` from the RIGHT
# (a client cannot inject entries to the right of the edge's appended IP).
#
# trusted-proxy-hops = number of trusted reverse proxies in front of this app.
# Railway's edge = 1. This stays correct for direct-to-backend paths (e.g. the SPA's
# binary PDF/XLSX fetches that bypass Vercel): those still resolve via the
# right-counted X-Forwarded-For with a getRemoteAddr() fallback.
#
# Public/QR traffic reaches the backend through the Vercel BFF (server-side), so its
# TCP peer is Vercel and the raw XFF no longer ends at the real respondent. That
# traffic is now attributed via the trusted X-Bvisionry-Client-Ip header the BFF
# forwards, gated by X-Bvisionry-Proxy-Secret — so per-IP rate-limit buckets see the
# real respondent's IP, not a single shared Vercel egress IP. The header is trusted
# only when the presented secret matches bvisionry.proxy.shared-secret; a client
# cannot spoof its IP without also possessing the shared secret.
#
# A baked-in default secret is used when BVISIONRY_PROXY_SHARED_SECRET is unset, so this
# works without env config (kept identical to the BFF's default literal). SECURITY: that
# default is committed and therefore readable by anyone with the repo — OVERRIDE it in
# production by setting BVISIONRY_PROXY_SHARED_SECRET to a real secret matching the BFF's
# BFF_PROXY_SHARED_SECRET. Until then a determined attacker who reads the repo could forge
# X-Bvisionry-Client-Ip and spoof the per-IP rate-limit buckets.
server.forward-headers-strategy=none
bvisionry.security.trusted-proxy-hops=${TRUSTED_PROXY_HOPS:1}
bvisionry.proxy.shared-secret=${BVISIONRY_PROXY_SHARED_SECRET:default-bvisionry-proxy-secret-9f2c7a4e1d8b6053f4a9c2e7b1d6480a}

# Public Railway URL — SPA hits this directly for PDF/XLSX downloads,
# bypassing the Vercel proxy.
bvisionry.public.base-url=${BVISIONRY_PUBLIC_BASE_URL:https://bvisionry-be-production-v2.up.railway.app}

# ---------------------------------------------------------------------------
# Connection pool + web threads (B2). HikariCP defaults to only 10 connections
# and Tomcat to 200 worker threads; under a launch surge every hot-path write
# (session create, batch save, submit, evaluation persist) contends for those 10
# and threads pile up blocked on getConnection(). Size the pool explicitly and
# cap Tomcat threads so they can't vastly outnumber connections. Keep
# (instances * maximum-pool-size) comfortably under the Railway Postgres
# max_connections; add PgBouncer (transaction pooling) if you scale to multiple
# instances. TUNE WITH A LOAD TEST — these are safe starting values, not final.
# ---------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.leak-detection-threshold=60000
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:80}
server.tomcat.threads.min-spare=10

# ---------------------------------------------------------------------------
# Public rate limits made explicit (F40) — previously these relied on hidden
# in-code defaults (5/min public-assessment, 10/min survey). 5/min is too low for
# shared corporate/carrier NAT egress, which would 429 legitimate launch cohorts.
# Raised and surfaced as env-overridable knobs. The autosave batch save endpoint
# gets its OWN generous bucket so frequent legitimate autosaves are never throttled
# as if they were submits.
# ---------------------------------------------------------------------------
bvisionry.rate-limit.public-assessment.requests-per-minute=${RL_PUBLIC_ASSESSMENT:20}
bvisionry.rate-limit.public-assessment-save.requests-per-minute=${RL_PUBLIC_ASSESSMENT_SAVE:60}
bvisionry.rate-limit.survey-submit.requests-per-minute=${RL_SURVEY_SUBMIT:20}
bvisionry.rate-limit.auth.requests-per-minute=${RL_AUTH:10}

# ---------------------------------------------------------------------------
# AI confidence-escalation cost control for the launch window (F16). Escalation
# re-samples borderline pillars on the premium model, multiplying cost. Trim the
# extra-sample budget to 1 for launch; raise via env once volume/cost are known.
# ---------------------------------------------------------------------------
bvisionry.ai.escalation.samples=${AI_ESCALATION_SAMPLES:1}

# ---------------------------------------------------------------------------
# Health / readiness (F24). /actuator/health already checks the DataSource;
# enabling probe groups exposes /actuator/health/readiness + /liveness so the
# platform can drain an instance whose DB is down. Point Railway's healthcheck at
# /actuator/health/readiness. Redis is best-effort here (the rate limiter falls
# back to in-memory when it's unavailable), so its indicator must NOT fail the
# health check and trigger pointless restarts.
# ---------------------------------------------------------------------------
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=false
