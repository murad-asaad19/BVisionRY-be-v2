# ArchUnit configuration (see https://www.archunit.org/userguide/html/000_Index.html#_configuration)
#
# Architecture-freeze "ratchet": the frozen violation baseline lives in a
# repo-tracked directory (NOT under target/) so it is committed and reviewed
# alongside code. New violations fail the build; the baseline can only shrink.
#
# Path is resolved against the Maven module working directory (backend/), so it
# points at a version-controlled folder under src/test/resources.
freeze.store.default.path=src/test/resources/architecture/frozen-violations

# Ratchet semantics: NEW violations always FAIL the build — FreezingArchRule
# never absorbs them into the store, regardless of these flags.
#   allowStoreCreation=false -> the store already exists and is committed; a
#       machine that somehow lacks it will FAIL loudly instead of minting a new
#       (empty) baseline that would hide every current violation.
#   allowStoreUpdate=true    -> SOLVED violations are auto-pruned from the
#       store (the baseline shrinks — visible in the git diff of this dir).
#       This must stay true: cycle enumeration can reshuffle when unrelated
#       classes are added, and with updates disabled the prune step throws
#       StoreUpdateFailedException instead of passing (seen in practice when
#       RequestCorrelationFilter was added after calibration).
#
# To re-freeze after consciously accepting current violations:
#   ./mvnw -Dtest=ArchitectureRulesTest test -Darchunit.freeze.refreeze=true
freeze.store.default.allowStoreCreation=false
freeze.store.default.allowStoreUpdate=true

# Line-number drift tolerance: FreezingArchRule's default line matcher already
# matches stored violations that differ only by line number, so unrelated edits
# that shift a frozen line do not spuriously fail the build.
