spring.application.name=bvisionry-api
spring.profiles.active=dev

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bvisionry
spring.datasource.username=bvisionry
spring.datasource.password=bvisionry
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# Mail
spring.mail.host=localhost
spring.mail.port=1025

# AI engine (LangChain4j over OpenRouter's OpenAI-compatible API).
# Provider, API key, model names, temperature and max-tokens live in the DB
# (ai_configurations) and are managed from the admin panel — not here. The knobs
# below tune the model-agnostic robustness layer; all have safe in-code defaults.
# Repair loop: max times an output guardrail may reprompt the model on invalid output.
bvisionry.ai.repair-retries=2
# Transport-level retries on transient HTTP errors (per call).
bvisionry.ai.max-retries=2
# Circuit breaker — fast-fail when the provider is failing or pathologically slow.
bvisionry.ai.cb.failure-rate-threshold=50
bvisionry.ai.cb.slow-call-duration-seconds=120
bvisionry.ai.cb.wait-duration-open-seconds=30
bvisionry.ai.cb.sliding-window-size=20
bvisionry.ai.cb.minimum-calls=8
# Sized above pillarExecutor.maxPoolSize (16) + escalation budget so local fan-out
# contention can't manufacture provider failures; brief bursts queue for max-wait-millis.
bvisionry.ai.bulkhead.max-concurrent=24
bvisionry.ai.bulkhead.max-wait-millis=3000
# Confidence-gated self-consistency: borderline scores get extra samples (median).
bvisionry.ai.escalation.enabled=true
bvisionry.ai.escalation.borderline-margin=3
bvisionry.ai.escalation.samples=2
# Optional stronger model for escalation; blank = re-sample the configured model.
bvisionry.ai.escalation.model=
# OpenRouter routing-variant suffix appended to the model id on the wire (a
# provider-routing shortcut): "nitro" sorts providers by throughput (fastest
# tok/s), "floor" by price. Blank = OpenRouter default routing. Base id still
# drives capability detection and the client cache. Reversible: blank to revert.
bvisionry.ai.openrouter.routing-variant=nitro

# Encryption
bvisionry.encryption.secret-key=${BVISIONRY_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

# Rate Limiting
bvisionry.rate-limit.try-it-out.requests-per-minute=10
bvisionry.rate-limit.evaluation.requests-per-minute=30
# Public business-card lookup (per IP). Generous — a card may be scanned
# repeatedly at an event — but bounded so the PII endpoint can't be scraped.
bvisionry.rate-limit.business-card.requests-per-minute=60

# Frontend (canonical: the merged Next.js app on :3000; Vite SPA is retired)
bvisionry.frontend.base-url=${BVISIONRY_FRONTEND_BASE_URL:http://localhost:3000}

# Public origin of this backend, returned to the SPA so it knows where to
# direct binary fetches that bypass the Vercel proxy. Overridden in
# production via BVISIONRY_PUBLIC_BASE_URL.
bvisionry.public.base-url=${BVISIONRY_PUBLIC_BASE_URL:http://localhost:8080}

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Super-admin bootstrap (SuperAdminBootstrap). Empty by default: source ships no
# credential. In prod these MUST be supplied via env; if unset, no admin is
# auto-created. The dev profile overrides these with clearly dev-only values.
bvisionry.bootstrap.super-admin.email=${SUPERADMIN_EMAIL:}
bvisionry.bootstrap.super-admin.password=${SUPERADMIN_PASSWORD:}

# JWT
bvisionry.jwt.secret=${JWT_SECRET:bvisionry-dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
bvisionry.jwt.access-token-expiration-ms=86400000
bvisionry.jwt.refresh-token-expiration-ms=604800000

# OAuth2 SSO (set via environment variables in production)
bvisionry.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
bvisionry.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
bvisionry.oauth2.redirect-base-url=${OAUTH2_REDIRECT_BASE:http://localhost:8080}

# API Docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Multipart upload (lesson media → MinIO, #39)
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# MinIO / S3 object storage (lesson media, #39).
# internal-endpoint: reached by the backend inside the compose network (minio:9000 in docker).
# public-endpoint: browser-reachable host used to SIGN GET/PUT URLs the <video>/<object> load.
bvisionry.minio.internal-endpoint=${MINIO_ENDPOINT:http://localhost:9000}
bvisionry.minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
bvisionry.minio.access-key=${MINIO_ACCESS_KEY:minio}
bvisionry.minio.secret-key=${MINIO_SECRET_KEY:minio123}
bvisionry.minio.bucket=${MINIO_BUCKET:bvisionry-media}
bvisionry.minio.presigned-expiry-minutes=${MINIO_PRESIGNED_EXPIRY_MINUTES:60}
