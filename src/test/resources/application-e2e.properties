# E2E profile — wires the backend against the dedicated docker-compose.e2e.yml stack.
# AI calls are short-circuited by E2eChatModelFactory (returns canned JSON, never hits the network).
# All /test/** routes are unauthenticated and gated by @Profile("e2e"), so they cannot leak into prod.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/bvisionry_e2e}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:e2e}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:e2e}

# Real Redis on the e2e port. CacheConfig hard-wires a RedisCacheManager, so faking
# the cache layer would silently change behavior compared to prod — see docker-compose.e2e.yml.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6380}

# Mail goes nowhere — invitations/reset emails won't be delivered, which is fine for E2E.
bvisionry.mail.transport=smtp
bvisionry.mail.from=no-reply@bvisionry.e2e
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Mail health probe: we point spring.mail.host at a port nothing listens on,
# so disable the indicator that would otherwise mark /actuator/health as DOWN.
management.health.mail.enabled=false

# Disable Spring AI's auto-configured ChatModel — the e2e profile substitutes
# its own ChatModel via E2eAiConfig (FakeChatModel) and we don't want the
# auto-config crashing context refresh on a missing ANTHROPIC_API_KEY env.
spring.ai.model.chat=none

# Loosen rate limits so the suite doesn't trip them.
bvisionry.rate-limit.try-it-out.requests-per-minute=10000
bvisionry.rate-limit.evaluation.requests-per-minute=10000

# Fixed JWT/encryption secrets so tokens minted in globalSetup remain valid mid-run.
bvisionry.jwt.secret=e2e-jwt-secret-key-for-deterministic-tokens-must-be-at-least-256-bits-long
bvisionry.encryption.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

bvisionry.frontend.base-url=http://localhost:4173
bvisionry.cors.allowed-origins=http://localhost:5173,http://localhost:4173,http://localhost:3000
