name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # mvnw is committed without the executable bit (developed on Windows),
      # so restore it before invoking the wrapper on the Linux runner.
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      # Docker is available on ubuntu-latest, so Testcontainers (postgres:16-alpine) runs here.
      - name: Build and verify
        run: ./mvnw -B verify
