# Dev profile — mail goes through MailHog running in docker-compose.
# MailHog UI: http://localhost:8025  ·  SMTP: localhost:1025 (no auth, no TLS)
bvisionry.mail.transport=smtp
bvisionry.mail.from=no-reply@bvisionry.local

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Cookies are set Secure in production; dev runs over plain HTTP and the
# browser would silently drop a Secure cookie there.
bvisionry.security.cookies.secure=false

# Dev-only super-admin bootstrap so LOCAL login keeps working after the seeded
# admin was removed (see SuperAdminBootstrap + V84). These are NON-SECRET dev
# values; production supplies SUPERADMIN_EMAIL / SUPERADMIN_PASSWORD via env.
bvisionry.bootstrap.super-admin.email=admin@bvisionry.com
bvisionry.bootstrap.super-admin.password=Password123!
